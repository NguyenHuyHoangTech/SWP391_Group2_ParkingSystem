spring:
  application:
    name: parking-system-backend

  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=ParkingManagementSystem;encrypt=true;trustServerCertificate=true
    username: sa
    password: 12345
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true